<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Hype ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@500&family=Pacifico&family=Oswald:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding-top:env(safe-area-inset-top,20px);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
background:radial-gradient(circle at 20% 20%, #1a1a2e,#000);
overflow-x:hidden;
font-family:sans-serif;
}

/* sparkles */

#sparkleContainer{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.sparkle{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
opacity:0;
animation:twinkle 1.5s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0;transform:scale(.5)}
50%{opacity:1;transform:scale(1.6)}
}

/* message */

#messageContainer{
width:90vw;
max-width:600px;
margin-top:10px;
margin-bottom:15px;
z-index:5;
text-align:center;
}

.message{
color:white;
font-weight:bold;
font-size:1.9rem;
word-wrap:break-word;
transition:opacity .4s ease;
text-shadow:0 0 12px rgba(255,255,150,.9);
}

/* image */

.imageWrapper{
display:inline-block;
position:relative;
z-index:2;
}

.imageWrapper img{
max-width:80vw;
max-height:60vh;
border-radius:20px;
opacity:0;
transform:scale(.96);
transition:opacity 2s ease,transform 2s ease;
animation:zoom 12s infinite alternate ease-in-out;
}

.imageWrapper img.loaded{
opacity:1;
transform:scale(1);
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.05)}
}

/* spotify */

#musicContainer{
margin-top:20px;
margin-bottom:40px;
display:flex;
justify-content:center;
z-index:3;
}

#musicContainer iframe{
width:90vw;
max-width:320px;
height:80px;
border-radius:12px;
border:none;
}

/* refresh */

#refreshBtn{
position:fixed;
bottom:20px;
right:20px;
background:white;
color:black;
border:none;
border-radius:50%;
width:52px;
height:52px;
font-size:22px;
cursor:pointer;
z-index:10;
}

</style>
</head>

<body>

<div id="sparkleContainer"></div>

<div id="messageContainer">
<div class="message" id="randomMessage"></div>
</div>

<div class="imageWrapper">
<img id="randomImage">
</div>

<div id="musicContainer"></div>

<button id="refreshBtn">✨</button>

<script>

/* ---------- DATA ---------- */

const images =
Array.from({length:50},(_,i)=>`images/pic${i+1}.jpeg`)

const messages=[

"You are unstoppable ✨",
"Main character energy activated 💫",
"Today belongs to you 🔥",
"Confidence looks incredible on you 👑",
"Your glow is undeniable ✨",
"Icon behaviour only 💅",
"Limitless energy today ⚡",
"Dream bigger today 🌟",
"You radiate power 💛",
"Everything is aligning for you 🌠",
"Walk like you own the universe 🌌",
"You've got this 💪",
"Pure brilliance today ✨",
"You are doing amazing 🌟",
"Legend energy activated 🚀",
"Step into your magic ✨",
"Glow differently today 💫",
"You are powerful beyond measure ⚡",
"Your vibe is unmatched 💥",
"Sparkle unapologetically ✨"

]

const tracks=[

"https://open.spotify.com/embed/track/7GhIk7Il098yCjg4BQjzvb?utm_source=generator&autoplay=1",
"https://open.spotify.com/embed/track/3n3Ppam7vgaVa1iaRUc9Lp?utm_source=generator&autoplay=1",
"https://open.spotify.com/embed/track/1AhDOtG9vPSOmsWgNW0BEY?utm_source=generator&autoplay=1"

]

const textStyles=[

{font:"'Playfair Display',serif",italic:true,glow:true,size:"2rem"},
{font:"'Montserrat',sans-serif",italic:false,glow:false,size:"1.8rem"},
{font:"'Pacifico',cursive",italic:false,glow:true,size:"2.2rem"},
{font:"'Oswald',sans-serif",italic:false,glow:true,size:"2rem"}

]

/* ---------- SHUFFLE BAG SYSTEM ---------- */

function shuffle(array){

for(let i=array.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
;[array[i],array[j]]=[array[j],array[i]]
}

}

function createShuffleBag(source){

let bag=[]

return function(){

if(bag.length===0){
bag=[...source]
shuffle(bag)
}

return bag.pop()

}

}

/* create randomizers */

const getImage=createShuffleBag(images)
const getMessage=createShuffleBag(messages)
const getTrack=createShuffleBag(tracks)
const getStyle=createShuffleBag(textStyles)

/* ---------- SPARKLES ---------- */

const sparkleContainer=document.getElementById("sparkleContainer")

for(let i=0;i<85;i++){

const s=document.createElement("div")

s.className="sparkle"
s.style.top=Math.random()*100+"%"
s.style.left=Math.random()*100+"%"
s.style.width=s.style.height=(Math.random()*2+1)+"px"
s.style.animationDuration=(Math.random()*1+1)+"s"
s.style.animationDelay=Math.random()*3+"s"

sparkleContainer.appendChild(s)

}

/* ---------- GENERATOR ---------- */

function generateHype(){

/* image */

const img=getImage()

const imgEl=document.getElementById("randomImage")

imgEl.classList.remove("loaded")
imgEl.src=img+"?"+Date.now()

imgEl.onload=()=>imgEl.classList.add("loaded")

/* message */

const msg=getMessage()

const msgEl=document.getElementById("randomMessage")

msgEl.style.opacity=0

setTimeout(()=>{

msgEl.textContent=msg

const style=getStyle()

msgEl.style.fontFamily=style.font
msgEl.style.fontStyle=style.italic?"italic":"normal"
msgEl.style.fontSize=style.size
msgEl.style.color="white"
msgEl.style.textShadow=style.glow?"0 0 12px rgba(255,255,150,.9)":"none"

msgEl.style.opacity=1

},200)

/* spotify */

const track=getTrack()

document.getElementById("musicContainer").innerHTML=
`<iframe src="${track}" allow="autoplay; encrypted-media"></iframe>`

}

/* start */

generateHype()

/* refresh */

document
.getElementById("refreshBtn")
.addEventListener("click",generateHype)

/* regenerate when tab reopened */

window.addEventListener("focus",generateHype)

</script>

</body>
</html>
