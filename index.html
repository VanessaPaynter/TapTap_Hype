<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Hype ✨</title>

<style>
body {
  margin: 0;
  padding-top: env(safe-area-inset-top,20px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  background: radial-gradient(circle at 20% 20%, #1a1a2e,#000);
  overflow-x: hidden;
  font-family: sans-serif;
}

/* Glass card container */
#container {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 90vw;
  max-width: 600px;
  backdrop-filter: blur(12px);      /* frosted glass blur */
  background: rgba(255,255,255,0.02); /* very transparent, lets stars show through */
  border-radius: 24px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1); /* soft glow shadow */
  z-index: 2;
  margin-top: 20px;
}

/* Sparkles */
#sparkleContainer{
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:0;
}
.sparkle{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0;
  animation:twinkle 1.5s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0; transform: scale(0.5);}
  50%{opacity:1; transform: scale(1.6);}
}

/* Boss overlay */
#bossOverlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Pacifico', cursive;       /* playful, luxe script */
  font-size: 2.2rem;
  font-weight: bold;
  color: #ffe5b4;                         /* soft peachy color */
  text-shadow: 0 0 15px #ffd700;         /* golden glow */
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  text-align: center;
  line-height: 1.2;                       /* nice spacing for 2 lines */
  max-width: 80vw;                         /* wraps nicely on mobile */
  word-break: break-word;
  white-space: pre-line;                  /* preserves line breaks */
}

/* Message */
#messageContainer{
  width:100%;
  text-align:center;
  margin-bottom:15px;
}
.message{
  color:white;
  font-weight:bold;
  font-size:1.9rem;
  word-wrap:break-word;
  transition:opacity 0.5s ease;
  text-shadow:0 0 12px rgba(255,255,150,0.9);
}

/* Image */
.imageWrapper{
  display:inline-block;
  position:relative;
  width:100%;
}
.imageWrapper img{
  max-width:100%;
  max-height:60vh;
  border-radius:20px;
  opacity:0;
  transform: scale(0.96);
  transition: opacity 1.5s ease, transform 1.5s ease;
  animation: zoom 12s infinite alternate ease-in-out;
}
.imageWrapper img.loaded{
  opacity:1;
  transform: scale(1);
}
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.05);}
}

/* Spotify */
#musicContainer{
  margin-top:20px;
  margin-bottom:20px;
  display:flex;
  justify-content:center;
}
#musicContainer iframe{
  width:90vw;
  max-width:320px;
  height:80px;
  border-radius:12px;
  border:none;
}

/* Refresh Button */
#refreshBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  border:none;
  border-radius:50%;
  width:52px;
  height:52px;
  font-size:22px;
  cursor:pointer;
  z-index:10;
}

/* Mobile font adjustment */
@media screen and (max-width:400px){
  .message{
    font-size:1.5rem;
  }
}
</style>
</head>

/* ---------- SHUFFLE BAG SYSTEM ---------- */
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}

function createShuffleBag(source){
  let bag=[];
  return function(){
    if(bag.length===0){
      bag=[...source];
      shuffle(bag);
    }
    return bag.pop();
  }
}

}
